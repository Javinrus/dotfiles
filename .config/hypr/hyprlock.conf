# This was modified as of version 0.9.5
source = ~/.config/hypr/parts/theme.conf

background {
    path = screenshot
    blur_size = 5
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.5
    vibrancy_darkness = 0.5
}

general {
    hide_cursor = true
    ignore_empty_input = true
}

input-field {
    size = 300, 50
    outline_thickness = 5
    dots_size = 0.25
    dots_floating = 0.35
    dots_center = true
    outer_color = $fg
    inner_color = $bg
    font_color = $fg
    fade_on_empty = false
    rounding = -1
    check_color = $warn
    placeholder_text = <i><span foreground=$fg>Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# Date
label {
    text = cmd[update:1800000] printf "$(date +"%A, %B %d")"
}











# Time
label
