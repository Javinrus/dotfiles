# Monitors
monitor = eDP-1, 1920x1080, 0x0, 1.2
monitor = HDMI-A-1, preferred, auto, 1 ,mirror, eDP-1 # Make mirroring work out of the box.

# Inputs
input {
    kb_layout = us
    kb_options = compose:ralt # I wish left alt was possible.

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}