# Split the configuration into smaller parts for better organization.
source = ~/.config/hypr/parts/*

# Autostart Programs
exec-once = waybar & swaybg & swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Fix X11 apps from displaying as pixelated. Will be changed to try to force these apps to use Wayland first.
xwayland {
    force_zero_scaling = true
}

# Miscellaneous
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}