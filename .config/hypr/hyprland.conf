# Split the configuration into smaller parts for better organization
source = ~/.config/hypr/parts/*

# Autostart Programs
exec-once = waybar & swaybg & swaync
exec-once = /usr/lib/xfce-polkit/xfce-polkit

# Fix X11 apps from displaying pixelated
xwayland {
    force_zero_scaling = true
}

# Miscellaneous
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
